# serverless.yml

# 1. 组件信息
component: scf  # (必填) 使用腾讯云 SCF 组件[reference:1]
name: email_agent # (必填) 给你的服务实例起个名字

# 2. 组件输入参数
inputs:
  # --- 函数基础配置 ---
  name: email_agent  # 在腾讯云上显示的云函数名
  src: ./  # 源代码所在路径，这里代表项目根目录
  handler: main.main_handler # 入口函数，格式：文件.函数名
  runtime: Python3.10  # 运行时环境，推荐与本地一致[reference:2]
  region: ap-guangzhou  # 部署区域，如广州、上海等
  description: 这是一个用于监控邮箱新邮件并发送提醒的云函数 # 函数描述

  # --- 资源配额配置 ---
  memorySize: 128  # 内存大小（MB），128MB对邮件监控任务足够[reference:3]
  timeout: 60      # 超时时间（秒），根据邮件检查、推送等操作设置[reference:4]

  # --- 环境变量 (⚠️ 关键) ---
  # 在这里注入敏感信息，避免写在代码里[reference:5]
  environment:
    variables:
      QQ_EMAIL: ${env:QQ_EMAIL}           # 从本地环境变量读取（部署时）
      QQ_AUTH_CODE: ${env:QQ_AUTH_CODE}
      CAMPUS_EMAIL: ${env:CAMPUS_EMAIL}
      CAMPUS_PASSWORD: ${env:CAMPUS_PASSWORD}
      SEND_KEY: ${env:SEND_KEY}
      AUTO_REPLY_ENABLED: ${env:AUTO_REPLY_ENABLED}

  # --- 触发器 (让函数定时运行) ---
  events:
    - timer:  # 定时触发器[reference:6]
        name: mail-check-timer  # 触发器名称
        parameters:
          cronExpression: '*/5 * * * *'  # Cron 表达式：每5分钟触发一次[reference:7]
          enable: true  # 启用触发器