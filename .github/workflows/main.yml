# .github/workflows/deploy.yml
name: Deploy SCF

on:
  push:
    branches: [ main ]  # 当推送到 main 分支时触发部署

jobs:
  deploy:
    name: Deploy to Tencent SCF
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt -t .; fi

      - name: Deploy to Tencent SCF
        uses: woodyyan/tencent-serverless-action@main
        env:
          STAGE: dev
          SERVERLESS_PLATFORM_VENDOR: tencent
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_AUTH_CODE: ${{ secrets.QQ_AUTH_CODE }}
          CAMPUS_EMAIL: ${{ secrets.CAMPUS_EMAIL }}
          CAMPUS_PASSWORD: ${{ secrets.CAMPUS_PASSWORD }}
          SEND_KEY: ${{ secrets.SEND_KEY }}
          AUTO_REPLY_ENABLED: ${{ secrets.AUTO_REPLY_ENABLED }}
